<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Price Predictor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>🚗 Car Price Predictor</h1>
    <p class="subtitle">Enter your car's details to estimate its resale price</p>

    <form action="/predict" method="POST" class="form-grid">
      <div class="form-group">
        <label for="year">Manufacturing Year</label>
        <input type="number" id="year" name="year" min="1995" max="2026"
               value="{{ form_data.year if form_data else 2020 }}" required>
      </div>

      <div class="form-group">
        <label for="present_price">Current Ex-Showroom Price (in Lakhs ₹)</label>
        <input type="number" id="present_price" name="present_price" step="0.01" min="0"
               value="{{ form_data.present_price if form_data else '' }}" placeholder="e.g. 8.5" required>
      </div>

      <div class="form-group">
        <label for="kms_driven">Kilometers Driven</label>
        <input type="number" id="kms_driven" name="kms_driven" min="0"
               value="{{ form_data.kms_driven if form_data else '' }}" placeholder="e.g. 45000" required>
      </div>

      <div class="form-group">
        <label for="owner">Number of Previous Owners</label>
        <select id="owner" name="owner" required>
          <option value="0">0 (First owner)</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </div>

      <div class="form-group">
        <label for="fuel_type">Fuel Type</label>
        <select id="fuel_type" name="fuel_type" required>
          {% for option in fuel_options %}
          <option value="{{ option }}">{{ option }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="seller_type">Seller Type</label>
        <select id="seller_type" name="seller_type" required>
          {% for option in seller_options %}
          <option value="{{ option }}">{{ option }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="transmission">Transmission</label>
        <select id="transmission" name="transmission" required>
          {% for option in trans_options %}
          <option value="{{ option }}">{{ option }}</option>
          {% endfor %}
        </select>
      </div>

      <button type="submit" class="predict-btn">Predict Price</button>
    </form>

    {% if prediction is not none %}
    <div class="result">
      <h2>Estimated Selling Price</h2>
      <p class="price">₹ {{ prediction }} Lakhs</p>
    </div>
    {% endif %}

    {% if error %}
    <div class="error">
      <p>Something went wrong: {{ error }}</p>
    </div>
    {% endif %}
  </div>
</body>
</html>
